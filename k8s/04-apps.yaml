apiVersion: v1
kind: Service
metadata:
  name: chat-service
spec:
  selector:
    app: chat-service
  ports:
    - name: grpc
      port: 50055
      targetPort: 50055
    - name: health
      port: 3005
      targetPort: 3005
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
        - name: chat-service
          image: w07/chat-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50055
            - containerPort: 3005
          env:
            - name: NODE_ENV
              value: development
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: w07-secrets
                  key: CHAT_DATABASE_URL
            - name: PORT
              value: "3005"
            - name: GRPC_PORT
              value: "50055"
          envFrom:
            - configMapRef:
                name: w07-config
            - secretRef:
                name: w07-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 3004
      targetPort: 3004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: w07/notification-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: CORS_ORIGIN
              value: http://localhost:5173
            - name: RABBITMQ_PREFETCH
              value: "1"
          envFrom:
            - configMapRef:
                name: w07-config
            - secretRef:
                name: w07-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 5
---
