apiVersion: v1
kind: Service
metadata:
  name: student-service
spec:
  selector:
    app: student-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: health
      port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-service
  template:
    metadata:
      labels:
        app: student-service
    spec:
      containers:
        - name: student-service
          image: w07/student-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: development
            - name: DB_NAME
              value: student_db
            - name: GRPC_ADDRESS
              value: 0.0.0.0:50051
            - name: HEALTH_PORT
              value: "3001"
          envFrom:
            - configMapRef:
                name: w07-config
            - secretRef:
                name: w07-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: course-service
spec:
  selector:
    app: course-service
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
    - name: health
      port: 3002
      targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: course-service
  template:
    metadata:
      labels:
        app: course-service
    spec:
      containers:
        - name: course-service
          image: w07/course-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50052
            - containerPort: 3002
          env:
            - name: INSTANCE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_ENV
              value: development
            - name: DB_NAME
              value: course_db
            - name: PORT
              value: "3002"
            - name: GRPC_HOST
              value: 0.0.0.0
            - name: GRPC_PORT
              value: "50052"
          envFrom:
            - configMapRef:
                name: w07-config
            - secretRef:
                name: w07-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
---
