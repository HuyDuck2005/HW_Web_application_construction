apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-outbox-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-outbox-worker
  template:
    metadata:
      labels:
        app: chat-outbox-worker
    spec:
      containers:
        - name: worker
          image: w07/chat-service:dev
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "worker:outbox"]
          env:
            - name: NODE_ENV
              value: development
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: w07-secrets
                  key: CHAT_DATABASE_URL
            - name: CHAT_OUTBOX_POLL_INTERVAL_MS
              value: "2000"
            - name: CHAT_OUTBOX_BATCH_SIZE
              value: "20"
            - name: CHAT_OUTBOX_MAX_ATTEMPTS
              value: "10"
          envFrom:
            - configMapRef:
                name: w07-config
            - secretRef:
                name: w07-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-course-events-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-course-events-consumer
  template:
    metadata:
      labels:
        app: notification-course-events-consumer
    spec:
      containers:
        - name: consumer
          image: w07/notification-service:dev
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "consumer:course-events"]
          env:
            - name: NOTIFICATION_QUEUE
              value: notification.course.enrolled_count.increased.queue
            - name: RABBITMQ_PREFETCH
              value: "1"
          envFrom:
            - configMapRef:
                name: w07-config
            - secretRef:
                name: w07-secrets 