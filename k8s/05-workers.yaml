apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrollment-outbox-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enrollment-outbox-worker
  template:
    metadata:
      labels:
        app: enrollment-outbox-worker
    spec:
      containers:
        - name: worker
          image: w07/enrollment-service:dev
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "worker:outbox"]
          env:
            - name: NODE_ENV
              value: development
            - name: DB_NAME
              value: enrollment_db
            - name: OUTBOX_POLL_INTERVAL_MS
              value: "2000"
            - name: OUTBOX_BATCH_SIZE
              value: "20"
            - name: OUTBOX_MAX_ATTEMPTS
              value: "10"
          envFrom:
            - configMapRef:
                name: w07-config
            - secretRef:
                name: w07-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-enrollment-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: course-enrollment-consumer
  template:
    metadata:
      labels:
        app: course-enrollment-consumer
    spec:
      containers:
        - name: consumer
          image: w07/course-service:dev
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "consumer:enrollment"]
          env:
            - name: NODE_ENV
              value: development
            - name: DB_NAME
              value: course_db
            - name: COURSE_ENROLLMENT_QUEUE
              value: course.enrollment.confirmed.queue
            - name: COURSE_ENROLLMENT_DLQ
              value: course.enrollment.confirmed.dlq
            - name: COURSE_ENROLLMENT_ROUTING_KEY
              value: enrollment.confirmed
            - name: COURSE_ENROLLMENT_DLQ_ROUTING_KEY
              value: course.enrollment.confirmed.dead
            - name: COURSE_EVENT_MAX_RETRIES
              value: "3"
            - name: COURSE_EVENT_RETRY_DELAY_MS
              value: "3000"
            - name: RABBITMQ_PREFETCH
              value: "1"
          envFrom:
            - configMapRef:
                name: w07-config
            - secretRef:
                name: w07-secrets
---
