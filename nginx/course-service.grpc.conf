events {}

http {
    upstream course_service_upstream {
        least_conn;

        server host.docker.internal:50052 max_fails=2 fail_timeout=5s;
        server host.docker.internal:50062 max_fails=2 fail_timeout=5s;
    }

    server {
        listen 50052;
        http2 on;

        access_log /var/log/nginx/course-service-access.log;
        error_log /var/log/nginx/course-service-error.log warn;

        location / {
            grpc_pass grpc://course_service_upstream;
            grpc_connect_timeout 2s;
            grpc_read_timeout 30s;
            grpc_send_timeout 30s;
            grpc_next_upstream error timeout http_502 http_503 http_504;
            grpc_next_upstream_tries 2;
        }
    }
}