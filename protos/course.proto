syntax = "proto3";

package courseservice;

service CourseService {
  rpc GetCourse(GetCourseRequest) returns (CourseResponse);
  rpc ListCourses(ListCoursesRequest) returns (ListCoursesResponse);
  rpc ListTopCourses(ListTopCoursesRequest) returns (ListTopCoursesResponse);
  rpc ApplyEnrollmentConfirmed(ApplyEnrollmentConfirmedRequest) returns (ApplyEnrollmentConfirmedResponse);
}

message Course {
  string id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
  int32 enrolled_count = 5;
  int32 capacity = 6;
  string instance_name = 7;
}

message GetCourseRequest {
  string id = 1;
}

message CourseResponse {
  Course course = 1;
  string instance_name = 2;
}

message ListCoursesRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListTopCoursesRequest {
  int32 limit = 1;
}

message ListTopCoursesResponse {
  repeated Course courses = 1;
  string instance_name = 2;
}

message PageInfo {
  int32 total = 1;
  int32 limit = 2;
  int32 offset = 3;
  bool has_next_page = 4;
  bool has_previous_page = 5;
}

message ListCoursesResponse {
  repeated Course courses = 1;
  PageInfo page_info = 2;
  string instance_name = 3;
}

message ApplyEnrollmentConfirmedRequest {
  string event_id = 1;
  string enrollment_id = 2;
  string student_id = 3;
  string course_id = 4;
}

message ApplyEnrollmentConfirmedResponse {
  bool success = 1;
  string message = 2;
  string instance_name = 3;
}